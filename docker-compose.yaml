version: '3.8'

services:

  server:
    image: 'nginx:stable-alpine'
    ports:
      - '8000:80'
    volumes:
      - ./symfony:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - db
      - node

  php:
    build:
      context: ./dockerfiles
      dockerfile: php.dockerfile
    volumes:
      - ./symfony:/var/www/html:delegated
    ports:
      - '3000:9000'

  db:
    image: 'postgres:15.5-alpine3.18'
    restart: always
    env_file:
      - ./env/postgres.env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  node:
    image: 'node:21-alpine3.17'
    working_dir: /home/node/app
    ports:
      - '8001:8001'
    volumes:
      - ./nuxt:/home/node/app
    tty: true
    command: ["npm", "run", "dev"]

  composer:
    build:
      context: ./dockerfiles
      dockerfile: composer.dockerfile
    volumes:
      - ./symfony:/var/www/html

  symfony-console:
    build:
      context: ./dockerfiles
      dockerfile: php.dockerfile
    volumes:
      - ./symfony:/var/www/html
    entrypoint: ["php", "/var/www/html/bin/console"]
#  npm:

volumes:
  postgres_data: